# Periodically re-runs the Scryfall fetch so newly spoiled cards show up without a
# manual `npm run fetch`. Commits public/cards.json, sets.json, symbols.json
# straight to main when the fetch produces a diff; that push then triggers
# deploy.yml to rebuild and republish the site.
name: Update card data

on:
  schedule:
    # 12:00 UTC daily.
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-cards
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run fetch
      - id: diff
        run: |
          if git diff --quiet -- public/cards.json public/sets.json public/symbols.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/cards.json public/sets.json public/symbols.json
          git commit -m "Update card data from Scryfall"
          git push
